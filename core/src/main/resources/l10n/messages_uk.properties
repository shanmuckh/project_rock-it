! Shape
Shape.Conical = Конічний
Shape.Conical.desc1 = Конічний ніс має профіль трикутника.
Shape.Conical.desc2 = Конічний перехід має прямі боки.
Shape.Ogive = Ожив
Shape.Ogive.desc1 = Оживний ніс має профіль, який є сектором кола.  Параметр форми 1 продукує <b>дотичний ожив</b>, який має гладкий перехід до корпусної труби, параметри менше 1 продукують <b>видалені оживи</b>.
Shape.Ogive.desc2 = Оживний перехід має профіль, який є сектором кола. Параметр форми 1 продукує <b>дотичний ожив</b>, який має гладкий перехід до корпусної труби на задньому кінці, параметри менше 1 продукують <b>видалені оживи</b>.
Shape.Ellipsoid = Еліпсоїд
Shape.Ellipsoid.desc1 = Еліпсоїдний ніс має профіль півеліпса з великими осьовими довжинами 2&times;<i>Довжина</i> і <i>Діаметр</i>.
Shape.Ellipsoid.desc2 = Еліпсоїдний перехід має профіль півеліпса з великими осьовими довжинами 2&times;<i>Довжина</i> і <i>Діаметр</i>. Якщо перехід не відрізається, то профіль продовжується в центрі відповідним радіусом.
Shape.Powerseries = Серія з потужностей
Shape.Powerseries.desc1 = Ніс серії з потужностей має профіль <i>Радіус</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>Довжина</i>)<sup><i>k</i></sup>, де <i>k</i> є параметром форми. Для <i>k</i>=0.5 це буде <b>½-потужний</b> або <b>параболічний</b> ніс, для <i>k</i>=0.75 - <b>¾-потужний</b>, а для <i>k</i>=1 - <b>конічний</b> ніс.
Shape.Powerseries.desc2 = Перехід серії з потужностей має профіль <i>Радіус</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>Довжина</i>)<sup><i>k</i></sup>, де <i>k</i> є параметром форми. Для <i>k</i>=0.5 перехід є <b>½-потужний</b> або <b>параболічний</b>, для <i>k</i>=0.75 - <b>¾-потужний</b>, а для <i>k</i>=1 - <b>конічний</b>.
Shape.Parabolicseries = Параболічна серія
Shape.Parabolicseries.desc1 = Ніс параболічної серії має профіль параболи. Параметр форми визначає сектор параболи для використання. Параметр 1.0 продукує <b>повну параболу</b>, яка дотикається корпусної труби, 0.75 продукує <b>3/4 параболи</b>, 0.5 - <b>1/2 параболи</b> і 0 - <b>конічний</b> ніс.
Shape.Parabolicseries.desc2 = Перехід параболічної серії має профіль параболи. Параметр форми визначає сектор параболи для використання. Параметр 1.0 продукує <b>повну параболу</b>, яка дотикається корпусної труби на задньому кінці, 0.75 продукує <b>3/4 параболи</b>, 0.5 - <b>1/2 параболи</b> і 0 - <b>конічний</b> перехід.
Shape.Haackseries = Серія Haack
Shape.Haackseries.desc1 = Ніс серії Haack розроблені для мінімізації опору. Параметр форми 0 продукує <b>LD-Haack</b> або <b>Ніс Von Karman</b>, який мінімізує опір для фіксованої довжини і діаметру, параметр 0.333 продукує <b>LD-Haack</b> ніс, який мінімізує опір для фіксованої довжини і обсягу.
Shape.Haackseries.desc2 = Ніс серії <i>Haack</i> розроблені для мінімізації опіру. Ці форми переходів їхні еквіваленти, але не обов’язково продукують оптимальний опір для переходів. Параметр форми 0 продукує <b>LD-Haack</b> або <b>форму Von Karman</b>, а параметр 0.333 продукує <b>LV-Haack</b> форму.


