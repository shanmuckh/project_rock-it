! ComponentInfo
ComponentInfo.Rocket = Це ваш ракетоплан. Більше нема чого додати. Насолоджуйтесь його конструкцією та будівництвом! :)
ComponentInfo.AxialStage = Ступінь - це частина модельної ракети, яка містить двигуни, що запалюються послідовно і від’єднюються після згорання двигуна. <br>Кожен етап повинен безпечно спускатися після від’єднання. Головний етап, зазвичай називається <b>‘Sustainer’</b>, зазвичай спускається з засобом повторного запуску.
ComponentInfo.ParallelStage = Біковий прискорювач - це вигаданий компонент, який діє як точка кріплення до труби корпусу і може від’єднюватися від труби корпусу в визначений час під час політу. <br>Найпоширеніше використання прискорювача - прикріплення бокових прискорювачів.
ComponentInfo.PodSet = Под - це вигаданий компонент, який діє як точка кріплення до труби корпусу. <br>Однажди визначений, інші компоненти можуть бути прикріплені до пода для створення складних геометрій ракети.
ComponentInfo.NoseCone = Носовий конус - це переднє закінчення корпусу ракети. Носові конуси різноманітні за формою. <br>Задня частина може бути обрізана, щоб створити внутрішній плече, яке всувається в трубу корпусу для утримання носового конуса на місці.
ComponentInfo.BodyTube = Труба корпусу передусім використовується для забезпечення структури зовнішнього корпусу модельної ракети.
ComponentInfo.Transition = Перехід це частина аеродинамічної рами, яка зфермована з двох труб корпусу з різним зовнішнім діаметром. <br>Обидва кінці переходу обрізані для створення внутрішнќої плече, яке всувається в кожну трубу корпусу, щоб утримати перехід на місці.
ComponentInfo.TrapezoidFinSet = Стабілізатори допомагають стабілізувати ракету. Найбільш поширена форма стабілізатора - це трапеціїдна форма, що потримується з чотирьох сторін з паралельними кореневими і кінцевими хордами (край, що клеється до труби корпусу і зовнішній край).
ComponentInfo.EllipticalFinSet = Стабілізатори допомагають стабілізувати ракету. Найбільш ефективна форма стабілізатора - це еліпсоїдна. Ця форма створює найменше зусилля зу усіх форм стабілізаторів. Вона часто використовується для конкуренційних політних заходів.
ComponentInfo.FreeformFinSet = Стабілізатори допомагають стабілізувати ракету. Найбільш універсальний стабілізатор - це стабілізатор вільної форми. Цей стабілізатор дозволяє створити практично будь-яку тверду форму стабілізатора з можливістю вручную вводити точки даних або імпортувати форму з зображення.
ComponentInfo.TubeFinSet = <b>Трубчасті стабілізатори</b> використовуються для утримання моделі ракети в прямому напрямку після запуску. Трубчасті стабілізатори можуть відрізнятися за довжиною і діаметром і мати прямі або вигнуті кінці. <br>На даний момент OpenRocket підтримує тільки прямі перпендикулярні кінці.
ComponentInfo.RailButton = <b>Кнопки для рейок</b> утримують модель ракети від <b>зміни орієнтації</b> під час запуску. Кнопки для рейок найчастіше використовуються на більших моделях ракет, парами, <b>заміст</b> <b>пускових лугвів</b>. <br>Їх можна монтувати на зовнішню сторону корпусної труби за допомогою гвинта і внутрішньої гайки. <br>Кнопка для рейки виглядає як дві шайби з розпорою між ними; одна шайба прилягає до корпусної труби, а інша ковзає всередині пускової рейки.
ComponentInfo.LaunchLug = <b>Пускова лугва</b> - це найпоширеніший керівник, що використовується для утримання менших модельних ракет від <b>зміни орієнтації</b> до тих пір, поки ракета не покине кінець пускової шахти.
ComponentInfo.InnerTube = <b>Внутрішні трубки</b> найчастіше використовуються для <b>моторних трубок</b>, але можуть бути частиною інших внутрішніх систем, таких як заслонки вибуху і надувні вагові конструкції. <br>Внутрішні трубки можуть бути позиціоновані радіально всередині корпусної трубки і, коли використовуються як моторна трубка, можуть бути складені.
ComponentInfo.TubeCoupler = <b>З'єднувач</b> - це коротка трубка, яка <b>з'єднує</b> дві <b>трубки</b> з <b>однаковим діаметром</b>. <br>У модельних ракетах, що використовують електроніку, з'єднувач може бути використаний для <b>блоку авіоніки</b>. <br>Трубки частіше клеяться до з'єднувача, щоб перешкодити їх ковзанню.
ComponentInfo.CenteringRing = <b>Центрувальні кільця</b> використовуються для <b>позиціонування</b> однієї або більше внутрішніх трубок всередині корпусної трубки. <br>Набори стабілізаторів мають автоматичну функцію кільця китиці для визначення ідеальної конфігурації кітиці на основі внутрішньої трубки, розташованої під кореневим шнуром стабілізаторів. Це також потребує двох центрувальних кільць нижче кореневого шнура.
ComponentInfo.Bulkhead = <b>Перегородка</b> це диск, який може мати або не мати маленьку дірку в центрі. Переборки використовуються для <b>запломбування</b> однієї області модельної ракети від іншої або для кріплення очей системи відновлення для <b>кріплення строп</b>, таких як кришки носових конусів і кришки блоку авіоніки.
ComponentInfo.EngineBlock = <b>Блок двигуна</b> зупиняє <b>мотор</b> від переміщення вперед в моторній монтажній трубі. <br>Для додавня двигуна, створіть <b>корпусную трубку</b> або <b>внутрішню трубку</b> і позначте її як моторний монтаж на вкладці <em>Двигун</em>.
ComponentInfo.Parachute = <b>Парашут</b> - найпоширеніший пристрій для відновлення. Маленькі парашути для модельних ракет зроблені з тонких, легких матеріалів, таких як поліетилен або Мілар, в той час як більші парашути зазвичай зроблені з найлону з риб'ячими лапами. Парашути можуть бути оздоблені яскравими і контрасними кольорами/візерунками для підвищення видимості. <br><b>Стропи</b> прикреплюють покривало парашута до <b>стропи</b>. Стропи іноді з'єднуються і кріплюються з допомогою вертлюжка.
ComponentInfo.Streamer = <b>Стрімер</b> - це пристрій для відновлення, який, при видаленні, розгортається і <b>пригальмує</b> модельну <b>ракету</b> під час спуску. <br>Стрімер - це довга, вузька, <b>прямокутна смуга</b> крепового паперу або тонкої пленки. Ширина і довжина стрімера змінюється відповідно до ваги ракети, але коефіцієнт довжина-ширина <b>10 до 1</b> вважається найкращим для стрімера.
ComponentInfo.ShockCord = Зв'язковий шнур прикріплює носовий конус і пристрій повернення до корпусної трубки, утримуючи модельну ракету разом під час спуску. <br>Менші ракети зазвичай мають короткі еластичні зв'язкові шнури, в той час як більші ракети мають довгі зв'язкові шнури, зроблені з найлону або стійкої до нагріву кевларової стрцяни.
ComponentInfo.MassComponent = Компонент маси може бути використаний для симуляції компонента, який не зазнається. <br>У OpenRocket цей тип компонента може бути призначений, наприклад, як алтиметр, пристрій повернення, або акумуляторна батарея …. Кожне призначення має своїй унікальний іконку, що допомагає в ідентифікації.

