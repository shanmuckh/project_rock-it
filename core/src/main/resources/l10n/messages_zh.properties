! ComponentInfo
ComponentInfo.Rocket = 这是您的火箭。没什么可说的。祝您设计和建造愉快！ :)
ComponentInfo.AxialStage = <b>级</b>是模型火箭的一个<b>部分</b>，包含依次点火的<b>发动机</b>，并在发动机燃尽后<b>分离</b>。<br>每一级在分离后必须安全下降。主级通常称为<b>"主发动机"</b>，通常配有<b>回收装置</b>下降。
ComponentInfo.ParallelStage = <b>助推器</b>是一个辅助组件，作为与<b>箭体</b>的<b>连接</b>点，<br>可以在飞行期间的指定时间与箭体<b>分离</b>。<br>助推器最常见的用途是连接<b>捆绑式助推器</b>。
ComponentInfo.PodSet = <b>吊舱</b>是一个辅助组件，作为与<b>箭体</b>的<b>连接</b>点。<br>定义后，可以将其他组件连接到吊舱以创建复杂的火箭几何形状。
ComponentInfo.NoseCone = <b>头锥</b>是火箭机身结构的<b>前端</b>。头锥的形状多种多样。<br>后端可以切割形成<b>内部肩部</b>，插入箭体内部以固定头锥。
ComponentInfo.BodyTube = <b>箭体</b>主要用于模型火箭外观主体的<b>结构</b>。
ComponentInfo.Transition = <b>级间段</b>是机身的一部分，用于<b>连接</b>具有不同外<b>径</b>的两根<b>箭体</b>。<br>级间段的两端都被切割形成内部肩部，插入每根箭体内部以在两端固定级间段。
ComponentInfo.TrapezoidFinSet = 鳍帮助<b>稳定</b>火箭。最常见的鳍形状是<b>梯形</b>，四边形，根弦和尖弦平行（粘接到箭体管和外边缘的边缘）。
ComponentInfo.EllipticalFinSet = 鳍帮助<b>稳定</b>火箭。最有效的鳍形状是<b>椭圆形</b>。这种形状诱导的<b>阻力最小</b>。它常用于竞赛飞行事件。
ComponentInfo.FreeformFinSet = 鳍帮助<b>稳定</b>火箭。最通用的鳍组件是<b>自由曲面鳍</b>。此鳍组件允许创建几乎任何固体鳍形状，能够手动输入数据点或从图像文件导入形状。
ComponentInfo.TubeFinSet = <b>管形翼</b>用于保持模型火箭在<b>发射后保持直线飞行</b>。管形翼的长度和直径各不相同，可以是直的或弯曲的端部。<br>目前，OpenRocket 仅支持垂直切割的直端。
ComponentInfo.RailButton = <b>导轨按钮</b>用于防止模型火箭在发射时<b>改变方向</b>。导轨按钮最常用于较大的模型火箭，成对使用，<b>代替</b><b>发射套柄</b>。<br>它们可以用螺钉和内部螺母安装到箭体外侧。<br>导轨按钮看起来像是两个垫圈中间有一个间隔物；一个垫圈靠在箭体上，另一个在发射导轨内滑动。
ComponentInfo.LaunchLug = <b>发射套柄</b>是用于防止小型模型火箭在火箭离开发射杆末端之前<b>改变方向</b>的最常见导向装置。
ComponentInfo.InnerTube = <b>内管</b>最常用于<b>发动机舱</b>，但也可能是其他内部系统的一部分，如弹射挡板和可调节配重设计。<br>内管可以径向放置在箭体内部，当用作发动机舱时，可以成簇排列。
ComponentInfo.TubeCoupler = <b>连接器</b>是一根短管，用于<b>连接</b>具有<b>相同直径</b>的两根<b>管</b>。<br>在使用电子设备的模型火箭中，连接器可用作<b>航电舱</b>。<br>管子经常粘在连接器上以防止滑动。
ComponentInfo.CenteringRing = <b>中心环</b>用于在一个<b>箭体</b>内部<b>定位</b>一个或多个<b>内管</b>。<br>稳定翼组具有<b>自动翼板</b>功能，可根据位于鳍根弦下方的内管确定理想的翼板配置。这还需要两个中心环位于根弦下方。
ComponentInfo.Bulkhead = <b>隔板</b>是一个可能有也可能没有中心小孔的圆盘。隔板用于<b>密封</b>模型火箭的某个区域，<br>或用于安装<b>减震索连接</b>的回收系统挂点，如头锥盖和航电舱盖。
ComponentInfo.EngineBlock = <b>发动机座</b>用于防止发动机向前窜出箭体。<br><br>添加发动机前请先添加<b>箭体</b>或<b>内管</b>，并在<em>发动机</em>页面上将其标记为发动机座。
ComponentInfo.Parachute = <b>降落伞</b>是最常见的<b>回收装置</b>。小型模型火箭降落伞由薄轻材料制成，如聚乙烯或聚酯薄膜，而大型降落伞最常用防撕裂尼龙制成。降落伞可以装饰鲜艳对比的颜色/图案以提高可见性。<br><b>吊索</b>将降落伞<b>伞衣</b>连接到<b>减震索</b>上。吊索有时会汇集在一起并用旋转扣连接。
ComponentInfo.Streamer = <b>飘带</b>是一种<b>回收装置</b>，弹出后会展开，在下降过程中<b>减缓</b>模型<b>火箭</b>的速度。<br>飘带是一条狭长的<b>矩形条</b>，由皱纹纸或薄塑料薄膜制成。飘带的宽度和长度根据火箭的重量进行调整，但<b>10 比 1 的长宽比</b>被认为是飘带的最佳比例。
ComponentInfo.ShockCord = <b>减震索</b>将<b>头锥</b>和<b>回收装置</b>连接到<b>箭体</b>上，使模型火箭在<b>下降</b>过程中保持一体。<br>小型火箭通常使用短的弹性减震索，而大型火箭则使用由尼龙或耐热凯夫拉纤维织带等材料制成的长减震索。
ComponentInfo.MassComponent = <b>质量组件</b>可用于模拟<b>未列出的其他组件</b>。<br>在 OpenRocket 中，此组件类型可指定为<b>高度计</b>、<b>飞控</b>、<b>电池</b>等。每种指定都有其独特的图标以便识别。

