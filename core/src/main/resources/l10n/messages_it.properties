! Shape
Shape.Conical = Conico
Shape.Conical.desc1 = Un naso conico ha un profilo triangolare.
Shape.Conical.desc2 = Una transizione conica ha profili dritti.
Shape.Ogive = Ogiva
Shape.Ogive.desc1 = Un naso ad ogiva ha un profilo che e' un arco di cerchio.  Il parametro di forma di valore 1 produce una <b>ogiva tangente</b>,che ha una transizione piu' dolce col corpo, valori minori di 1 producono una <b>ogiva secante</b>.
Shape.Ogive.desc2 = Una transizione ad ogiva ha un profilo ad arco di cerchio.  \tIl parametro di valore 1 produce una <b>ogiva tangente</b>,che ha una transizione piu' dolce col corpo, valori minori di 1 producono una <b>ogiva secante</b>.
Shape.Ellipsoid = Ellissoide
Shape.Ellipsoid.desc1 = Un naso ad ellissoide ha un profilo di una mezza ellisse con l'asse maggiore = 2&times;<i>Lunghezza</i> e quello minore = <i>Diametro</i>.
Shape.Ellipsoid.desc2 = Un naso ad ellissoide ha un profilo di una mezza ellisse con l'asse maggiore = 2&times;<i>Lunghezza</i> e quello minore = <i>Diametro</i>.  Se la transizione non e' clipped, allora il profilo e' esteso verso il centro del corrispondente raggio.
Shape.Powerseries = Serie di potenza
Shape.Powerseries.desc1 = Un naso della serie di potenza ha un profilo di <i>Raggio</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>Lunghezza</i>)<sup><i>k</i></sup> dove <i>k</i> e' il parametro di forma.  Per <i>k</i>=0.5 questo e' un <b>½-potenza</b> o naso <b>parabolico</b> , per <i>k</i>=0.75 a <b>¾-potenza</b>, e per <i>k</i>=1 un naso <b>conico</b> .
Shape.Powerseries.desc2 = Un naso della serie di potenza ha un profilo di <i>Raggio</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>Lunghezza</i>)<sup><i>k</i></sup> dove <i>k</i> e' il parametro di forma.  Per <i>k</i>=0.5 questo e' un <b>½-potenza</b> o naso <b>parabolico</b> , per <i>k</i>=0.75 a <b>¾-potenza</b>, e per <i>k</i>=1 un naso <b>conico</b> .
Shape.Parabolicseries = Parabolico
Shape.Parabolicseries.desc1 = Un naso parabolico h il profilo di una parabola.  Il parametro di forma definisce il settore della parabola da utilizzare.  Il parametro di forma 1.0 produce una  <b>parabola intera</b> che e' tangente al corpo, 0.75 produce una <b>3/4 parabola</b>, 0.5 produce una <b>1/2 parabola</b> e 0 produce un naso <b>conico</b> .
Shape.Parabolicseries.desc2 = Un naso parabolico h il profilo di una parabola.  Il parametro di forma definisce il settore della parabola da utilizzare.  Il parametro di forma 1.0 produce una  <b>parabola intera</b> che e' tangente al corpo, 0.75 produce una <b>3/4 parabola</b>, 0.5 produce una <b>1/2 parabola</b> e 0 produce un naso <b>conico</b> .
Shape.Haackseries = Haack 
Shape.Haackseries.desc1 = I nasi della serie Haack sono disegnati per minimizzare l'attrito.  Il parametro di forma 0 produce un <b>LD-Haack</b> o naso di <b>Von Karman</b> , che minimizza l'attrito per lunghezza e diametro fissati, mentre un valore di 0.333 produce un naso <b>LV-Haack</b>, che minimizza l'attrito per lunghezza e volume fissati.
Shape.Haackseries.desc2 = I <i>nasi</i> di Haack sono disegnati per minimizzare l'attrito.  Queste forme di transizioni sono i loro equivalenti, ma non necessariamente producono un attrito ottimale per la transizione.  Il parametro di forma 0 produce una forma <b>LD-Haack</b> o <b>Von Karman</b> , mentre un valore di  0.333 produce una forma <b>LV-Haack</b> \t


