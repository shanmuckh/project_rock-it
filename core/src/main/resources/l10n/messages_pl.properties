! Shape
Shape.Conical = Stożkowy
Shape.Conical.desc1 = Głowica stożkowa ma przekrój w kształcie trójkąta.
Shape.Conical.desc2 = Stożkowa talia przejściowa ma proste boki.
Shape.Ogive = Ostrołuk
Shape.Ogive.desc1 = Głowica w kształcie ostrołuku ma przekrój będący fragmentem okręgu.  Wartość parametru kształtu równa 1 tworzy <b>ostrołuk styczny</b>, który zapewnia gładkie połączenie głowicy z korpusem rakiety. Wartości poniżej 1 tworzą <b>ostrołuki sieczne</b>.
Shape.Ogive.desc2 = Talia przejściowa w kształcie ostrołuku ma przekrój będący fragmentem okręgu.  
Shape.Ellipsoid = Elipsoida
Shape.Ellipsoid.desc1 = Głowica elipsoidalna ma przekrój w kształcie półelipsy o osiach głównych o długości 2&times;<i>długość</i> i <i>średnica</i>.
Shape.Ellipsoid.desc2 = Elipsoidalna talia przejściowa ma przekrój w kształcie półelipsy o osiach głównych o długości 2&times;<i>długość</i> i <i>średnica</i>.  Jeżeli talia przejściowa nie jest przycięta, to środek przekroju jest wybrzuszony przez promień tworzący.
Shape.Powerseries = Seria potęgowa
Shape.Powerseries.desc1 = Głowica serii potęgowej ma przekrój w kształcie: <i>promień</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>długość</i>)<sup><i>k</i></sup> gdzie<i>k</i> jest parametrem kształtu.  Dla <i>k</i> równego 0,5 mamy potęgę o stopniu 1/2, co nam daje głowicę paraboliczną. Dla <i>k</i> wynoszącego 0,75 dostajemy potęgę stopnia 3/4, zaś dla k wynoszącego 1 otrzymujemy głowicę stożkową.
Shape.Powerseries.desc2 = Talia przejściowa serii potęgowej ma przekrój w kształcie: <i>promień</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>długość</i>)<sup><i>k</i></sup> gdzie<i>k</i> jest parametrem kształtu.  Dla <i>k</i> równego 0,5 mamy potęgę o stopniu 1/2, co nam daje paraboliczną talię orzejściową. Dla <i>k</i> wynoszącego 0,75 dostajemy potęgę stopnia 3/4, zaś dla k wynoszącego 1 otrzymujemy stożkową talię przejściową.
Shape.Parabolicseries = Seria paraboliczna
Shape.Parabolicseries.desc1 = Głowica paraboliczna ma przekrój w kształcie paraboli.  Parametr kształtu określa odcinek paraboli, który zostanie użyty.  Wartość parametru kształtu równa 1 tworzy <b>pełną parabolę</b>, która jest styczna do korpusu rakiety, 0,75 tworzy <b> 3/4 paraboli</b>, 0,5 tworzy <b>1/2 paraboli</b> oraz 0 tworzy głowicę <b>stożkową</b>rakiety.
Shape.Parabolicseries.desc2 = Talia przejściowa paraboliczna ma przekrój w kształcie paraboli.  Parametr kształtu określa odcinek paraboli, który zostanie użyty.  Wartość parametru kształtu równa 1 tworzy <b>pełną parabole</b>, która jest styczna do tylnego końca, 0,75 tworzy <b> 3/4 paraboli</b>, 0,5 tworzy <b>1/2 paraboli</b> oraz 0 tworzy <b>stożkową</b> talię przejściową 
Shape.Haackseries = Seria Haacka
Shape.Haackseries.desc1 = Seria głowic Haacka została tak zaprojektowana, aby osiągnąć minimalny opór.  Wartość parametru kształtu równa 0 tworzy głowicę <b>LD-Haack</b> lub <b>Von Karman</b>, która minimalizuje opór przy ustalonej długości i średnicy głowicy. Wartość parametru kształtu równa 0.333 tworzy głowicę <b>LV-Haack</b> która minimalizuje opór przy ustalonej długości i objętości głowicy.
Shape.Haackseries.desc2 = Seria <i>głowic</i> Haacka została tak zaprojektowana, aby osiągnąć minimalny opór.  Talie przejściowe zaprojektowane według tej metody mają podobny kształt, ale niekoniecznie zapewniają optymalny opór talii przejściowej. Wartość parametru kształtu równa 0 tworzy kształt <b>LD-Haack</b> lub <b>Von Karman</b>, zaś wartość równa 0,333 tworzy kształt <b>LV-Haack</b>.


