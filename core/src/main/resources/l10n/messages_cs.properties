! Shape
Shape.Conical = Kuželovitý
Shape.Conical.desc1 = Kuželovitý prídový kryt má profil jako trojúhelník.
Shape.Conical.desc2 = Kužel má rovné strany.
Shape.Ogive = Obloukovitý
Shape.Ogive.desc1 = Profil prídového krytu ve tvaru lomeného oblouku tvorí úsek kružnice. Tvarový parametr o hodnote 1 urcuje <b>tecnu lomeného oblouku</b>, která plynule od oblouku prechází jako telo rakety , hodota menší než 1 urcuje <b>secnu lomeného oblouku</b>.
Shape.Ogive.desc2 = Profil prídového krytu ve tvaru lomeného oblouku tvorí úsek kružnice. Tvarový parametr o hodnote 1 urcuje <b>tecnu lomeného oblouku</b>, která plynule od oblouku prechází jako telo rakety na zád, hodota menší než 1 urcuje <b>secnu lomeného oblouku</b>.
Shape.Ellipsoid = Eliptycký
Shape.Ellipsoid.desc1 = Eliptický prídový kryt má profil jako polovina epilpsy a hlavními osamy jsou 2&times;<i>délka</i> a <i>prumer</i>.
Shape.Ellipsoid.desc2 = Eliptický prídový kryt má profil jako polovina epilpsy a hlavními osamy jsou 2&times;<i>délka</i> a <i>prumer</i>.  Pokud prechod není oríznut, pak je profi rozšíren v centru odpovídajícím polomeru.\t\t
Shape.Powerseries = Mocniná rada
Shape.Powerseries.desc1 = Prídový kryt ve tvaru mocniné rady má profil <i>rádiusu</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>délka</i>)<sup><i>k</i></sup> kde <i>k</i> je tvarový parametr.  Pro <i>k</i>=0.5 je to <b>½-power</b> nebo <b>parabolický</b> prídový kryt, pro <i>k</i>=0.75 a <b>¾-power</b>, a pro <i>k</i>=1 a <b>kuželovitý</b> prídový kryt.
Shape.Powerseries.desc2 = Prechod trupu ve tvaru mocniné rady má profil <i>rádiusu</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>délka</i>)<sup><i>k</i></sup> kde <i>k</i> je tvarový parametr.  Pro <i>k</i>=0.5 je prechod trupu <b>½-power</b> nebo <b>parabola</b>, pro <i>k</i>=0.75 a <b>¾-power</b>, a pro <i>k</i>=1 <b>kužel</b>.
Shape.Parabolicseries = Parabola
Shape.Parabolicseries.desc1 = Parabolický prídový kryt má profil paraboly.  Tvarový parametr definuje úsek paraboly, který je využit.  Tvarový parametr 1.0 produkuje <b>plnou parabolu</b> kde telová trubka je její tecnou, 0.75 produkuje <b>3/4 parabolu</b>, 0.5 produkuje <b>1/2 parabolu</b> a 0 produkuje <b>kuželovitý</b> prídový kryt.
Shape.Parabolicseries.desc2 = Parabolický prechod trupu má profil paraboly.  Tvarový parametr definuje úsek paraboly, který je využit.  Tvarový parametr 1.0 produkuje <b>plnou parabolu</b> kde telová trubka je její tecnou na zadní cásti, 0.75 produkuje <b>3/4 parabolu</b>, 0.5 produkuje <b>1/2 parabolu</b> a 0 produkuje <b>kuželovitý</b> prechod trupu.
Shape.Haackseries = Haack 
Shape.Haackseries.desc1 = Haackový prídový kryt je navržen pro minimalizování aerodynamického odporu.  Tvarový parametr 0 produkuje <b>LD-Haack</b> nebo <b>Von Karmanuv</b> prídový kryz, který minimalizuje aerodynamický odpor pro pevne danou délku a prumer, zatímco hodnota 0.333 produkuje <b>LV-Haack</b> prídový kryt, který minimalizuje aerodynamický odpor pro pevnš danou délku a objem.
Shape.Haackseries.desc2 = Haackový <i>prídový kryt</i> je navržen pro minimalizování aerodynamického odporu.  Tyto prechody trupu jsou jeho ekvivalenty, ale nemusí mit nutne optimální aerodynamický odpor vzduchu pro prechod trupu.  Tvarový parametr 0 produkuje <b>LD-Haack</b> nebo <b>Von Karmanuv</b> tvar, zatímco hodnota 0.333 produkuje tvar<b>LV-Haack</b>.\t\t


