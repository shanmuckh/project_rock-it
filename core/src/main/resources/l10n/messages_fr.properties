! Shape
Shape.Conical = Conique
Shape.Conical.desc1 = Un cône conique a un profil triangulaire.
Shape.Conical.desc2 = Une transition conique a des côtés droits.
Shape.Ogive = Ogive
Shape.Ogive.desc1 = Un cône ogival a un profil qui est un segment de cercle. La valeur du paramètre de forme 1 produit une <b>ogive tangente</b>, qui a une transition en douceur vers le tube de la fusée, des valeurs inférieures à 1 produisent des <b>ogives sécantes</b>.
Shape.Ogive.desc2 = Une transition en ogive a un profil qui est un segment de cercle.  \tLa valeur du paramètre de forme 1 produit une <b>ogive tangente</b>, qui a une transition en douceur vers le tube de la fusée à l'extrémité arrière, des valeurs inférieures à 1 produisent des <b>ogives sécantes</b>.
Shape.Ellipsoid = Ellipsoïde
Shape.Ellipsoid.desc1 = Un cône ellipsoïdal a un profil d'une demi ellipse dont les axes principaux sont de longueurs 2&times;<i>la longueur</i> et <i>diamètre</i>.
Shape.Ellipsoid.desc2 = Une transition ellipsoïdale a un profil d'une demi ellipse dont les axes principaux sont de longueurs 2&times;<i>longueur</i> et <i>diamètre</i>.  Si la transition n'est pas coupée alors le profil est étendu au centre par le rayon correspondant.\t\t
Shape.Powerseries = Série Haute puissance
Shape.Powerseries.desc1 = Un cône de puissance a un profil de <i>Rayon</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>Longueur</i>)<sup><i>k</i></sup> ou <i>k</i> est le paramètre de la forme.  Pour <i>k</i>=0,5 c'est une <b>½-puissance</b> ou une ogive <b>parabolique</b>, pour <i>k</i>=0,75 une <b>¾-puissance</b>, et pour <i>k</i>=1 un cône <b>conique</b>.
Shape.Powerseries.desc2 = Une transition de la série haute puissance a un profile de <i>Rayon</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>Longueur</i>)<sup><i>k</i></sup> ou <i>k</i> est le paramètre de la forme.  Pour <i>k</i>=0,5 la transition est <b>½-puissance</b> ou <b>parabolique</b>, pour <i>k</i>=0,75 une <b>¾-puissance</b>, et pour <i>k</i>=1 <b>conique</b>.
Shape.Parabolicseries = Série parabolique
Shape.Parabolicseries.desc1 = Un cône parabolique a un profil d'une parabole.  Le paramètre de forme définit le segment de la parabole à utiliser.  Le paramètre 1 produit une <b>parabole pleine</b> qui est tangent au tube de la fusée, 0,75 produit un <b>3/4 de parabole</b>, 0,5 produit une <b>1/2 parabole</b> et 0 produit un cône <b>conique</b>.
Shape.Parabolicseries.desc2 = Une transition de type parabolique a un profile en forme de parabole.  Le paramètre de forme définit le segment de la parabole à utiliser.  Le paramètre 1,0 produit une <b>parabole pleine</b> qui est tangent au tube de la fusée à l'extrémité arrière, 0,75 produit une <b>3/4 parabole</b>, 0,5 produit une <b>1/2 parabole</b> et 0 produit une transition <b>conique</b>.
Shape.Haackseries = Série Haack
Shape.Haackseries.desc1 = Les cônes du type Haack sont conçus pour minimiser la trainée.  Le paramètre de forme égale à 0 produit une <b>LD-Haack</b> ou un cône <b>Von Karman</b>, ce qui a pour effet de minimiser la trainée pour une longueur et un diamètre fixe, tandis qu'une valeur de 0,333 produit un cône <b>LV-Haack</b>, ce qui minimise la trainée pour une longueur et un volume fixe.
Shape.Haackseries.desc2 = Les <i>cônes</i> du type Haack sont conçus pour minimiser la trainée.  Ces formes de transition sont leurs équivalents, mais ne produisent pas nécessairement des valeurs optimales.  Le paramètre 0 produit une forme <b>LD-Haack</b> ou <b>Von Karman</b>, tandis qu'une valeur de 0,333 produit une forme <b>LV-Haack</b>.\t\t


