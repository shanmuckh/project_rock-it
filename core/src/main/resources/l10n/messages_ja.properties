! Shape
Shape.Conical = 円錐形
Shape.Conical.desc1 = 円錐形ノーズコーンは三角形の断面をしている
Shape.Conical.desc2 = 円錐形トランジションの側面は直線的
Shape.Ogive = オジーブ
Shape.Ogive.desc1 = オジーブのノーズコーンは円の一部分の輪郭をしている。形状係数が1では<b>接線オジーブ</b>が作られ、これはボディチューブとなめらかに接続される。1以下では<b>割線オジーブ</b>が作られる
Shape.Ogive.desc2 = オジーブのタンジェントは円の一部分の輪郭をしている。形状係数が1では<b>接線オジーブ</b>が作られ、これはボディチューブとなめらかに接続される。1以下では<b>割線オジーブ</b>が作られる
Shape.Ellipsoid = 楕円体
Shape.Ellipsoid.desc1 = 楕円体のノーズコーンは楕円を半分にした輪郭をしていて軸の長さは2&times;<i>長さ</i>と<i>直径</i>
Shape.Ellipsoid.desc2 = 楕円体のトランジションは楕円を半分にした輪郭をしていて軸の長さは2&times;<i>長さ</i>と<i>直径</i>。トランジションがクリップされていなかったら一致する半径まで拡張される
Shape.Powerseries = Power series
Shape.Powerseries.desc1 = Power seriesのノーズコーンは <i>半径</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>長さ</i>)<sup><i>k</i></sup> ここで<i>k</i>は形状係数。  <i>k</i>
Shape.Powerseries.desc2 = Power seriesのトランジションは <i>半径</i>&nbsp;&times;&nbsp;(<i>x</i>&nbsp;/&nbsp;<i>長さ</i>)<sup><i>k</i></sup> ここで<i>k</i>は形状係数。  <i>k</i>
Shape.Parabolicseries = Parabolic series
Shape.Parabolicseries.desc1 = Parabolic seriesのノーズコーンは放物線の輪郭をしている。形状係数は放物線の一部分を利用して定義している。形状係数1.0では<b>放物線の全部</b>でこれはボディチューブになめらかに繋がる、0.75では<b>放物線の3/4</b>、0.5では<b>放物線の1/2</b>そして0では <b>円錐形</b>ノーズコーンになる。
Shape.Parabolicseries.desc2 = Parabolic seriesのトランジションは放物線の輪郭をしている。形状係数は放物線の一部分を利用して定義している。形状係数1.0では<b>放物線の全部</b>でこれはボディチューブになめらかに繋がる、0.75では<b>放物線の3/4</b>、0.5では<b>放物線の1/2</b>そして0では <b>円錐形</b>トランジションになる。
Shape.Haackseries = Haack series
Shape.Haackseries.desc1 = Haack seriesのノーズコーンは抗力が最小になるように設計されている。形状係数0では<b>LD-Haack</b>または<b>Von Karman</b>と呼ばれるノーズコーンになる、これは一定の長さと直径においては最小の抗力になる。形状係数0.333では<b>LV-Haack</b>ノーズコーンになる。これは一定の長さと容積では最小の抗力になる。
Shape.Haackseries.desc2 = Haack seriesのノーズコーンは抗力が最小になるように設計されている。トランジションでも形状は同等であるが、必ずしもトランジションの最適な抗力になるとは限らない。形状係数0では<b>LD-Haack</b>または<b>Von Karman</b>と呼ばれる形状になる。形状係数0.333では<b>LV-Haack</b>形状になる。


